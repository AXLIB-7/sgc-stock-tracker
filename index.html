<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>SGC Stock tracker</title>
<style>
  :root {
    --bg: #f6f5f2; --surface: #ffffff; --surface-2: #fbfaf8;
    --text: #1c1b19; --text-secondary: #6b6964; --text-muted: #9c9a93;
    --border: #e4e2dc; --border-strong: #d2cfc7; --accent: #2e6b4f;
    --danger-bg: #fcebeb; --danger-bar: #c94f4e; --danger-text: #8c2f2e; --danger-border: #ecc8c7;
    --warn-bg: #fdf2e2; --warn-bar: #c9842c; --warn-text: #8c5a17; --warn-border: #ecd8b6;
    --good-bg: #eaf3e4; --good-bar: #4f8a3f; --good-text: #335e29; --good-border: #c9ddbe;
    --radius: 10px; font-synthesis: none;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191816; --surface: #232220; --surface-2: #292825;
      --text: #f0eee8; --text-secondary: #b3b0a7; --text-muted: #837f75;
      --border: #38362f; --border-strong: #49463c;
      --danger-bg: #382323; --danger-bar: #d96a69; --danger-text: #f0a8a7; --danger-border: #4d2f2e;
      --warn-bg: #3a2f1c; --warn-bar: #d99a44; --warn-text: #f0c184; --warn-border: #4d3c22;
      --good-bg: #28331f; --good-bar: #6fa85c; --good-text: #a8d394; --good-border: #3a4a2c;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; margin: 0 0 2px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  button {
    font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
    border: 0.5px solid var(--border-strong); background: var(--surface);
    color: var(--text); border-radius: var(--radius); padding: 9px 14px;
    transition: background 0.15s, transform 0.1s; white-space: nowrap;
  }
  button:hover { background: var(--surface-2); }
  button:active { transform: scale(0.97); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #275c43; }
  button.active-toggle { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger-text { color: var(--danger-text); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  input {
    font-family: inherit; font-size: 15px; padding: 9px 11px; width: 100%;
    border: 0.5px solid var(--border-strong); border-radius: var(--radius);
    background: var(--surface); color: var(--text);
  }
  input:focus { outline: none; box-shadow: 0 0 0 2px rgba(46,107,79,0.25); border-color: var(--accent); }
  input::placeholder { color: var(--text-muted); }

  .auth-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 12px; margin-bottom: 1rem; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 12.5px; }
  .auth-bar .who { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: 1px; }
  .dot-ok { background: #4f8a3f; } .dot-bad { background: #c94f4e; } .dot-mid { background: #c9842c; }
  .auth-bar button { font-size: 12px; padding: 5px 10px; flex-shrink: 0; }

  .signin-screen { text-align: center; padding: 3rem 1rem; }
  .signin-screen .brand { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
  .signin-screen h1 { margin-bottom: 8px; }
  .signin-screen p { color: var(--text-secondary); font-size: 14px; margin: 0 0 1.5rem; line-height: 1.5; }
  .signin-screen button { font-size: 15px; padding: 11px 22px; }
  .signin-error { color: var(--danger-text); font-size: 13px; margin-top: 1rem; }
  .loading-screen { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 14px; }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 1rem; }
  .header-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .header-actions button { font-size: 12.5px; padding: 7px 12px; }

  /* Summary */
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
  .tile { border-radius: var(--radius); padding: 10px 6px; text-align: center; border: 0.5px solid; }
  .tile .num { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .tile .lbl { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; opacity: 0.85; margin-top: 2px; }

  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap input { padding-left: 34px; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }

  .panel { background: var(--surface-2); border: 0.5px solid var(--border-strong); border-radius: 12px; padding: 14px; margin-bottom: 1rem; }
  .panel-title { font-size: 13px; font-weight: 600; margin: 0 0 10px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .panel-actions { display: flex; gap: 8px; margin-top: 10px; }
  .panel-actions button { flex: 1; }

  /* Cards */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .card { position: relative; border-radius: 12px; overflow: hidden; border: 0.5px solid var(--border); background: var(--surface); }
  .card-fill { position: absolute; inset: 0; right: auto; pointer-events: none; transition: width 0.35s ease; }
  .card-inner { position: relative; padding: 12px 14px; }
  .card-top { display: flex; align-items: center; gap: 10px; }
  .rank { width: 26px; height: 26px; flex-shrink: 0; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; border: 0.5px solid; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 14.5px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-qty { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .card-pct { text-align: right; flex-shrink: 0; }
  .pct-num { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
  .pct-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; opacity: 0.85; margin-top: 2px; }
  .bar-track { margin-top: 10px; height: 4px; background: var(--border-strong); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.35s ease; }
  .card-actions { margin-top: 10px; display: flex; gap: 6px; }
  .card-actions button { flex: 1; font-size: 12px; padding: 7px 8px; }
  .card-actions button.icon-btn { flex: 0 0 auto; padding: 7px 10px; }
  .crate-row { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
  .crate-step { flex: 0 0 auto; width: 34px; height: 38px; padding: 0; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .crate-input { flex: 1; text-align: center; font-weight: 600; }
  .crate-hint { font-size: 11px; color: var(--text-muted); text-align: center; margin: 6px 0 0; }
  .save-cancel-row { display: flex; gap: 6px; margin-top: 8px; }
  .save-cancel-row button { flex: 1; font-size: 12.5px; padding: 7px 10px; }

  /* Take-out form */
  .takeout-form { margin-top: 10px; background: var(--surface-2); border-radius: 8px; padding: 10px; border: 0.5px solid var(--border); }
  .takeout-form label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  .takeout-form input { margin-bottom: 8px; font-size: 14px; padding: 8px 10px; }
  .takeout-form .row2 { margin-top: 0; }

  /* Log screen */
  .log-screen { display: none; }
  .log-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .log-header h2 { font-size: 18px; font-weight: 600; margin: 0; flex: 1; }
  .log-empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 14px; }
  .log-entry { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
  .log-entry-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .log-item-name { font-size: 14px; font-weight: 600; }
  .log-lot { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .log-qty { text-align: right; flex-shrink: 0; }
  .log-qty-num { font-size: 16px; font-weight: 700; color: var(--danger-text); font-variant-numeric: tabular-nums; }
  .log-qty-label { font-size: 10px; color: var(--text-muted); }
  .log-date { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 14px; }
  .footer-count { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 1.25rem; }
  .unit-badge { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 4px; margin-left: 6px; background: var(--good-bg); color: var(--good-text); border: 0.5px solid var(--good-border); vertical-align: 1px; }
  .pouch-badge { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
</style>
</head>
<body>
<div class="wrap">

  <div id="authBar" class="auth-bar" style="display:none;">
    <span class="who"><span class="status-dot dot-ok" id="statusDot"></span><span id="statusText">Synced</span></span>
    <button id="signOutBtn">Sign out</button>
  </div>

  <!-- Sign in screen -->
  <div id="signinScreen" class="signin-screen">
    <p class="brand">SGC &middot; Seattle Gummy Company</p>
    <h1>Stock tracker</h1>
    <p>Sign in with your work Microsoft account to load and save inventory data to your company OneDrive.</p>
    <button class="primary" id="signInBtn">Sign in with Microsoft</button>
    <div id="signinError" class="signin-error"></div>
  </div>

  <div id="loadingScreen" class="loading-screen" style="display:none;">Loading your inventory from OneDrive...</div>

  <!-- Main inventory screen -->
  <div id="appShell" style="display:none;">
    <div class="header">
      <div>
        <p class="eyebrow">SGC &middot; Seattle Gummy Company</p>
        <h1>Stock levels</h1>
      </div>
      <div class="header-actions">
        <button id="pouchToggleBtn">View in pouches</button>
        <button id="exportExcelBtn">Export Excel</button>
        <button id="logViewBtn">View log</button>
        <button class="primary" id="addBtn">+ Add item</button>
      </div>
    </div>

    <div class="summary">
      <div class="tile" style="background:var(--danger-bg); border-color:var(--danger-border);">
        <div class="num" id="sumCritical" style="color:var(--danger-text);">0</div>
        <div class="lbl" style="color:var(--danger-text);">Critical</div>
      </div>
      <div class="tile" style="background:var(--warn-bg); border-color:var(--warn-border);">
        <div class="num" id="sumLow" style="color:var(--warn-text);">0</div>
        <div class="lbl" style="color:var(--warn-text);">Low</div>
      </div>
      <div class="tile" style="background:var(--good-bg); border-color:var(--good-border);">
        <div class="num" id="sumGood" style="color:var(--good-text);">0</div>
        <div class="lbl" style="color:var(--good-text);">Good</div>
      </div>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" placeholder="Search items">
    </div>

    <div id="addPanel" class="panel" style="display:none;">
      <p class="panel-title">New item</p>
      <input id="newName" placeholder="Item name">
      <div class="row2">
        <input id="newCurrent" type="number" min="0" placeholder="Current qty (units)">
        <input id="newTarget" type="number" min="1" placeholder="Target qty (units)">
      </div>
      <input id="newPouches" type="number" min="1" placeholder="Pouches per unit (default 225)" style="margin-top:8px;">
      <div class="panel-actions">
        <button id="cancelAdd">Cancel</button>
        <button class="primary" id="confirmAdd" style="flex:2;">Add item</button>
      </div>
    </div>

    <div id="list" class="list"></div>
    <p class="footer-count" id="footerCount"></p>
  </div>

  <!-- Log screen -->
  <div id="logScreen" class="log-screen">
    <div class="log-header">
      <button id="backFromLog">&#8592; Back</button>
      <h2>Take-out log</h2>
      <button id="exportCsvBtn">Export CSV</button>
    </div>
    <div id="logList"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<script>
const CLIENT_ID = 'db8d33ea-a736-4152-be60-714f71fd7a0f';
const TENANT_ID = '5ed35cd3-7f0d-4691-b1f9-56d422d5b3ca';
const REDIRECT_URI = 'https://axlib-7.github.io/sgc-stock-tracker/';
const SCOPES = ['Files.ReadWrite', 'User.Read'];
const POUCHES_PER_UNIT = 225; // default fallback
function factor(item) { return item.pouchesPerUnit || POUCHES_PER_UNIT; }
const FOLDER_NAME = 'SGC Stock Tracker';
const FILE_NAME = 'inventory.json';
const GRAPH_FILE_URL = 'https://graph.microsoft.com/v1.0/me/drive/root:/' +
  encodeURIComponent(FOLDER_NAME) + '/' + encodeURIComponent(FILE_NAME) + ':/content';

const msalConfig = {
  auth: { clientId: CLIENT_ID, authority: 'https://login.microsoftonline.com/' + TENANT_ID, redirectUri: REDIRECT_URI },
  cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false }
};
const msalInstance = new msal.PublicClientApplication(msalConfig);

const SAMPLES = [
  { id: 1, name: 'Sour gummy worms', current: 12, target: 100 },
  { id: 2, name: 'Peach rings', current: 85, target: 100 },
  { id: 3, name: 'Gummy bears', current: 45, target: 100 },
  { id: 4, name: 'Mango bites', current: 8, target: 200 },
  { id: 5, name: 'Watermelon slices', current: 150, target: 200 },
  { id: 6, name: 'Cola bottles', current: 3, target: 500 },
];

let items = [];
let log = [];
let search = '';
let editMode = {};
let pouchMode = false;

function pct(item) { return item.target > 0 ? Math.round((item.current / item.target) * 100) : 0; }
function status(p) {
  if (p <= 30) return { key: 'danger', label: 'Critical' };
  if (p <= 70) return { key: 'warn', label: 'Low' };
  return { key: 'good', label: 'Good' };
}
const styleMap = {
  danger: { bg: 'var(--danger-bg)', bar: 'var(--danger-bar)', text: 'var(--danger-text)', border: 'var(--danger-border)' },
  warn:   { bg: 'var(--warn-bg)',   bar: 'var(--warn-bar)',   text: 'var(--warn-text)',   border: 'var(--warn-border)' },
  good:   { bg: 'var(--good-bg)',   bar: 'var(--good-bar)',   text: 'var(--good-text)',   border: 'var(--good-border)' },
};
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n) { return Number(n).toLocaleString(); }
function displayVal(units, f) { return pouchMode ? fmt(units * f) : fmt(units); }
function displayUnit() { return pouchMode ? 'pouches' : 'units'; }

function setStatus(text, kind) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (kind === 'ok' ? 'dot-ok' : kind === 'bad' ? 'dot-bad' : 'dot-mid');
}

async function getAccessToken() {
  const account = msalInstance.getActiveAccount() || msalInstance.getAllAccounts()[0];
  if (!account) throw new Error('Not signed in');
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account });
    return r.accessToken;
  } catch {
    const r = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    msalInstance.setActiveAccount(r.account);
    return r.accessToken;
  }
}

async function loadFromOneDrive() {
  document.getElementById('loadingScreen').style.display = 'block';
  document.getElementById('appShell').style.display = 'none';
  try {
    const token = await getAccessToken();
    const res = await fetch(GRAPH_FILE_URL, { headers: { Authorization: 'Bearer ' + token } });
    if (res.status === 404) {
      items = SAMPLES; log = [];
      await saveToOneDrive();
    } else if (res.ok) {
      const data = await res.json();
      // Handle both old format (plain array) and new format ({ items, log })
      if (Array.isArray(data)) { items = data; log = []; }
      else { items = data.items || []; log = data.log || []; }
    } else { throw new Error('Graph error ' + res.status); }
    setStatus('Synced', 'ok');
  } catch (e) {
    console.error(e); items = []; log = [];
    setStatus('Could not load from OneDrive', 'bad');
  }
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  render();
}

async function saveToOneDrive() {
  setStatus('Saving...', 'mid');
  try {
    const token = await getAccessToken();
    const res = await fetch(GRAPH_FILE_URL, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ items, log }, null, 2)
    });
    if (!res.ok) throw new Error('Save failed ' + res.status);
    const now = new Date();
    setStatus('Synced ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), 'ok');
  } catch (e) { console.error(e); setStatus('Save failed — check connection', 'bad'); }
}

function persist() { render(); saveToOneDrive(); }

function render() {
  const filtered = items.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));
  const sorted = filtered.map(i => ({ ...i, _pct: pct(i) })).sort((a, b) => a._pct - b._pct);

  document.getElementById('sumCritical').textContent = items.filter(i => pct(i) <= 30).length;
  document.getElementById('sumLow').textContent = items.filter(i => { const p = pct(i); return p > 30 && p <= 70; }).length;
  document.getElementById('sumGood').textContent = items.filter(i => pct(i) > 70).length;

  const pouchBtn = document.getElementById('pouchToggleBtn');
  if (pouchMode) { pouchBtn.textContent = 'View in units'; pouchBtn.classList.add('active-toggle'); }
  else { pouchBtn.textContent = 'View in pouches'; pouchBtn.classList.remove('active-toggle'); }

  const list = document.getElementById('list');
  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty">' + (items.length === 0 ? 'No items yet. Add your first item.' : 'No items match your search.') + '</div>';
  } else {
    list.innerHTML = sorted.map((item, idx) => {
      const st = status(item._pct);
      const sm = styleMap[st.key];
      const clamp = Math.min(item._pct, 100);
      const mode = editMode[item.id];
      const badgeClass = pouchMode ? 'unit-badge pouch-badge' : 'unit-badge';
      const badgeLabel = pouchMode ? 'pouches' : 'units';

      let actionsHtml = '';
      if (mode === 'count') {
        actionsHtml = `
          <div class="crate-row">
            <button class="crate-step step-btn" data-id="${item.id}" data-delta="-3">-3</button>
            <button class="crate-step step-btn" data-id="${item.id}" data-delta="-1">-1</button>
            <input type="number" min="0" class="crate-input" id="countInput-${item.id}" value="${item.current}" placeholder="Count">
            <button class="crate-step step-btn" data-id="${item.id}" data-delta="1">+1</button>
            <button class="crate-step step-btn" data-id="${item.id}" data-delta="3">+3</button>
          </div>
          <p class="crate-hint">&plusmn;1 unit &middot; &plusmn;3 units (1 crate) &middot; or type any number</p>
          <div class="save-cancel-row">
            <button class="cancel-mode-btn" data-id="${item.id}">Cancel</button>
            <button class="primary save-count-btn" data-id="${item.id}">Save</button>
          </div>`;
      } else if (mode === 'takeout') {
        actionsHtml = `
          <div class="takeout-form">
            <label>Lot number</label>
            <input id="lotInput-${item.id}" placeholder="e.g. LOT-2024-001" autocomplete="off">
            <div class="row2">
              <div>
                <label>Units to remove</label>
                <input type="number" min="1" id="takeQty-${item.id}" value="1">
              </div>
              <div>
                <label>= Pouches</label>
                <input type="number" id="takePouches-${item.id}" placeholder="${factor(item)}" readonly style="color:var(--text-muted);">
              </div>
            </div>
          </div>
          <div class="save-cancel-row" style="margin-top:8px;">
            <button class="cancel-mode-btn" data-id="${item.id}">Cancel</button>
            <button class="primary confirm-takeout-btn" data-id="${item.id}">Confirm take-out</button>
          </div>`;
      } else if (mode === 'edit') {
        actionsHtml = `
          <div style="margin-top:10px;">
            <input id="editName-${item.id}" value="${escapeHtml(item.name)}" placeholder="Item name" style="margin-bottom:6px;">
            <div class="row2" style="margin-top:0; margin-bottom:8px;">
              <input type="number" min="0" id="editCurrent-${item.id}" value="${item.current}" placeholder="Current qty">
              <input type="number" min="1" id="editTarget-${item.id}" value="${item.target}" placeholder="Target qty">
            </div>
            <input type="number" min="1" id="editPouches-${item.id}" value="${item.pouchesPerUnit || POUCHES_PER_UNIT}" placeholder="Pouches per unit" style="margin-bottom:8px;">
            <div class="card-actions">
              <button class="danger-text delete-btn" data-id="${item.id}" style="flex:0 0 auto;">Delete</button>
              <div style="flex:1;"></div>
              <button class="cancel-mode-btn" data-id="${item.id}" style="flex:0 0 auto;">Cancel</button>
              <button class="primary save-edit-btn" data-id="${item.id}" style="flex:0 0 auto;">Save</button>
            </div>
          </div>`;
      } else {
        actionsHtml = `
          <div class="card-actions">
            <button class="takeout-btn" data-id="${item.id}">Take out</button>
            <button class="count-btn" data-id="${item.id}">Update count</button>
            <button class="icon-btn edit-btn" data-id="${item.id}" aria-label="Edit">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </button>
          </div>`;
      }

      return `
        <div class="card" style="border-color:${sm.border};">
          <div class="card-fill" style="width:${clamp}%; background:${sm.bg};"></div>
          <div class="card-inner">
            <div class="card-top">
              <div class="rank" style="background:${sm.bg}; color:${sm.text}; border-color:${sm.border};">${idx+1}</div>
              <div class="card-info">
                <div class="card-name">${escapeHtml(item.name)} <span class="${badgeClass}">${badgeLabel}</span></div>
                <div class="card-qty">${displayVal(item.current, factor(item))} / ${displayVal(item.target, factor(item))}</div>
              </div>
              <div class="card-pct">
                <div class="pct-num" style="color:${sm.text};">${item._pct}%</div>
                <div class="pct-lbl" style="color:${sm.text};">${st.label}</div>
              </div>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${clamp}%; background:${sm.bar};"></div></div>
            ${actionsHtml}
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('footerCount').textContent = items.length > 0
    ? items.length + ' item' + (items.length !== 1 ? 's' : '') + ' tracked' : '';

  attachCardListeners();
}

function attachCardListeners() {
  document.querySelectorAll('.count-btn').forEach(b => b.onclick = () => { editMode[b.dataset.id] = 'count'; render(); });
  document.querySelectorAll('.takeout-btn').forEach(b => b.onclick = () => { editMode[b.dataset.id] = 'takeout'; render(); updatePouchPreview(b.dataset.id); });
  document.querySelectorAll('.edit-btn').forEach(b => b.onclick = () => { editMode[b.dataset.id] = 'edit'; render(); });
  document.querySelectorAll('.cancel-mode-btn').forEach(b => b.onclick = () => { delete editMode[b.dataset.id]; render(); });
  document.querySelectorAll('.step-btn').forEach(b => b.onclick = () => {
    const inp = document.getElementById('countInput-' + b.dataset.id);
    inp.value = Math.max(0, (parseInt(inp.value) || 0) + parseInt(b.dataset.delta));
  });
  document.querySelectorAll('.delete-btn').forEach(b => b.onclick = () => {
    items = items.filter(i => String(i.id) !== b.dataset.id);
    delete editMode[b.dataset.id]; persist();
  });
  document.querySelectorAll('.save-count-btn').forEach(b => b.onclick = () => {
    const id = b.dataset.id;
    const val = parseInt(document.getElementById('countInput-' + id).value);
    if (!isNaN(val) && val >= 0) { const it = items.find(i => String(i.id) === id); if (it) it.current = val; }
    delete editMode[id]; persist();
  });
  document.querySelectorAll('.save-edit-btn').forEach(b => b.onclick = () => {
    const id = b.dataset.id;
    const name = document.getElementById('editName-' + id).value.trim();
    const cur = parseInt(document.getElementById('editCurrent-' + id).value);
    const tgt = parseInt(document.getElementById('editTarget-' + id).value);
    if (name && tgt > 0) {
      const it = items.find(i => String(i.id) === id);
      if (it) { it.name = name; it.current = isNaN(cur) ? 0 : cur; it.target = tgt; it.pouchesPerUnit = parseInt(document.getElementById('editPouches-' + id).value) || POUCHES_PER_UNIT; }
      delete editMode[id]; persist();
    }
  });

  // Take-out: live pouch preview
  document.querySelectorAll('[id^="takeQty-"]').forEach(inp => {
    inp.oninput = () => updatePouchPreview(inp.id.replace('takeQty-', ''));
  });

  document.querySelectorAll('.confirm-takeout-btn').forEach(b => b.onclick = () => {
    const id = b.dataset.id;
    const lot = document.getElementById('lotInput-' + id).value.trim();
    const qty = parseInt(document.getElementById('takeQty-' + id).value) || 1;
    if (!lot) { document.getElementById('lotInput-' + id).focus(); return; }
    const it = items.find(i => String(i.id) === id);
    if (!it) return;
    const removed = Math.min(qty, it.current);
    it.current = Math.max(0, it.current - qty);
    log.unshift({
      id: Date.now(),
      itemId: it.id,
      itemName: it.name,
      lotNumber: lot,
      unitsRemoved: removed,
      pouchesRemoved: removed * factor(it),
      date: new Date().toISOString()
    });
    delete editMode[id];
    persist();
  });

  document.querySelectorAll('[id^="countInput-"]').forEach(inp => {
    inp.onkeydown = e => { if (e.key === 'Enter') document.querySelector('.save-count-btn[data-id="' + inp.id.split('-')[1] + '"]').click(); };
  });
}

function updatePouchPreview(id) {
  const qtyInp = document.getElementById('takeQty-' + id);
  const pouchInp = document.getElementById('takePouches-' + id);
  const it = items.find(i => String(i.id) === String(id));
  if (qtyInp && pouchInp && it) pouchInp.value = ((parseInt(qtyInp.value) || 0) * factor(it)).toLocaleString();
}

function renderLog() {
  const el = document.getElementById('logList');
  if (log.length === 0) { el.innerHTML = '<div class="log-empty">No take-outs recorded yet.</div>'; return; }
  el.innerHTML = log.map(e => {
    const d = new Date(e.date);
    const dateStr = d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' }) +
      ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return `
      <div class="log-entry">
        <div class="log-entry-top">
          <div>
            <div class="log-item-name">${escapeHtml(e.itemName)}</div>
            <div class="log-lot">Lot: ${escapeHtml(e.lotNumber)}</div>
          </div>
          <div class="log-qty">
            <div class="log-qty-num">-${fmt(e.unitsRemoved)} units</div>
            <div class="log-qty-label">${fmt(e.pouchesRemoved)} pouches</div>
          </div>
        </div>
        <div class="log-date">${dateStr}</div>
      </div>`;
  }).join('');
}

function exportCSV() {
  const header = ['Date', 'Item', 'Lot Number', 'Units Removed', 'Pouches Removed'];
  const rows = log.map(e => [
    new Date(e.date).toLocaleString(),
    e.itemName, e.lotNumber, e.unitsRemoved, e.pouchesRemoved
  ].map(v => '"' + String(v).replace(/"/g, '""') + '"'));
  const csv = [header, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sgc-takeout-log-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function showLogScreen() {
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('logScreen').style.display = 'block';
  renderLog();
}
function showInventoryScreen() {
  document.getElementById('logScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
}

function exportInventoryExcel() {
  const sorted = [...items].sort((a, b) => a.name.localeCompare(b.name));

  const rows = sorted.map(item => ({
    'Item':             item.name,
    'Current (pouches)': item.current * factor(item),
  }));

  const ws = XLSX.utils.json_to_sheet(rows);

  ws['!cols'] = [
    { wch: 28 }, // Item
    { wch: 18 }, // Current pouches
  ];

  ws['!autofilter'] = { ref: 'A1:B' + (rows.length + 1) };
  ws['!tables'] = [{
    name: 'StockInventory',
    ref:  'A1:B' + (rows.length + 1),
    headerRow: true,
    totalsRow: false,
  }];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Stock Levels');

  const now = new Date();
  const month = now.toLocaleString('en-US', { month: 'long', year: 'numeric' }).replace(' ', '-');
  XLSX.writeFile(wb, 'sgc-inventory-' + month + '.xlsx');
}

document.getElementById('exportExcelBtn').addEventListener('click', exportInventoryExcel);
document.getElementById('pouchToggleBtn').addEventListener('click', () => { pouchMode = !pouchMode; render(); });
document.getElementById('logViewBtn').addEventListener('click', showLogScreen);
document.getElementById('backFromLog').addEventListener('click', showInventoryScreen);
document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);
document.getElementById('searchInput').addEventListener('input', e => { search = e.target.value; render(); });
document.getElementById('addBtn').addEventListener('click', () => {
  document.getElementById('addPanel').style.display = 'block';
  document.getElementById('newName').focus();
});
document.getElementById('cancelAdd').addEventListener('click', () => {
  document.getElementById('addPanel').style.display = 'none';
  ['newName','newCurrent','newTarget','newPouches'].forEach(id => document.getElementById(id).value = '');
});
document.getElementById('confirmAdd').addEventListener('click', () => {
  const name = document.getElementById('newName').value.trim();
  const current = parseInt(document.getElementById('newCurrent').value) || 0;
  const target = parseInt(document.getElementById('newTarget').value) || 0;
  const ppu = parseInt(document.getElementById('newPouches').value) || POUCHES_PER_UNIT;
  if (!name || target <= 0) return;
  items.push({ id: Date.now(), name, current, target, pouchesPerUnit: ppu });
  document.getElementById('cancelAdd').click();
  persist();
});
document.getElementById('signOutBtn').addEventListener('click', () => msalInstance.logoutPopup().catch(() => {}));

async function onSignedIn() {
  document.getElementById('signinScreen').style.display = 'none';
  document.getElementById('authBar').style.display = 'flex';
  await loadFromOneDrive();
}
document.getElementById('signInBtn').addEventListener('click', async () => {
  document.getElementById('signinError').textContent = '';
  try {
    const r = await msalInstance.loginPopup({ scopes: SCOPES });
    msalInstance.setActiveAccount(r.account);
    await onSignedIn();
  } catch (e) {
    console.error(e);
    document.getElementById('signinError').textContent = 'Sign-in failed. Please try again.';
  }
});

(function init() {
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) { msalInstance.setActiveAccount(accounts[0]); onSignedIn(); }
})();
</script>
